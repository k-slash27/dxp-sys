services:
  geoserver:
    ports:
      - "8080:8080"

  postgis:
    ports:
      - "5432:5432"

  register-service:
    ports:
      - "8000:8000"
    volumes:
      - ./register-service/app:/app/app
      - ./register-service/templates:/app/templates

  operator:
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development

  frontend:
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

  nginx:
    ports:
      - "80:80"

volumes:
  # ローカル開発: named volume をホストの bind mount にマップ
  # コンテナ再作成後もデータが ./data/ に保持される
  geoserver_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/geoserver_data
  ortho_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/ortho
