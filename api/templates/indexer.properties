# TIME次元を持つImageMosaicのインデクサ設定
TimeAttribute=ingestion
Schema=*the_geom:Polygon,location:String,ingestion:java.util.Date
PropertyCollectors=TimestampFileNameExtractorSPI[timeregex](ingestion)

# リアルタイムのgranule追加を反映させるためキャッシュ無効
Caching=false

# シンリンク方式のためAbsolutePathが必要（仕様書§3.3 AbsolutePath=falseから逸脱、理由はdocs/imagemosaic.md参照）
AbsolutePath=true

# Cloud Optimized GeoTIFF（仕様書§3.4）
# Cog=true + CogRangeReader は S3/RustFS（HTTP Range Request）用の設定のため、
# file://アクセスの現フェーズでは設定しない。
# TIF ファイルは gdal_translate -of COG で変換済みのため、
# GeoServer の標準ファイルリーダーでも内部タイル・オーバービューの恩恵は受けられる。
# RustFS 導入時に以下を追加する:
#   Cog=true
#   CogRangeReader=it.geosolutions.imageioimpl.plugins.cog.S3RangeReader
