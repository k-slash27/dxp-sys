worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 5000m;

    upstream geoserver {
        server geoserver:8080;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream operator {
        server operator:3000;
    }

    upstream register_service {
        server register-service:8000;
    }

    server {
        listen 80;
        server_name _;

        # GeoServer（WMS/WFS/管理画面）
        location /geoserver/ {
            proxy_pass http://geoserver/geoserver/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
        }

        # Operator（ファイル管理UI）— basePath: /operator
        location /operator {
            proxy_pass http://operator;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_read_timeout 120s;
        }

        # register-service API
        location /api/register/ {
            proxy_pass http://register_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE（Server-Sent Events）のためにバッファリングを無効化
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
        }

        # フロントエンド（地図閲覧UI）
        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_read_timeout 120s;
        }
    }
}
